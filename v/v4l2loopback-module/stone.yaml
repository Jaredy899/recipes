name        : v4l2loopback-module
version     : "0.15.3"
release     : 12
homepage    : https://github.com/umlaeute/v4l2loopback
upstreams   :
    - https://github.com/umlaeute/v4l2loopback/archive/refs/tags/v0.15.3.tar.gz:
        hash: 2758ea287da8dd34a0421c0dd50094a0342d22414e1bbccbbe92f41bbaa26b2d
        unpack: false
        rename: v4l2.tar.gz
summary     : V4L2 loopback device (virtual camera)
description : |
    This module allows you to create virtual video devices. Normal (v4l2) applications
    will read these devices as if they were ordinary video devices, but the video
    is generated by another application. Perfect for OBS Virtual Camera.
license     : GPL-2.0-only
builddeps   :
    - binary(eu-readelf)
    - binary(zstd)
    - linux-gaming-devel
    - linux-lts-devel
    - linux-stable-devel
environment : |
    # Create list of kernels to build for
    declare -a kernels=()
    for dir in %(libdir)/kernel/*/; do
        dir=${dir%*/}
        kernels+=(${dir##*/})
    done
setup       : |
    for _kernel in ${kernels[@]}; do
        mkdir ${_kernel}
        bsdtar-static -xf %(sourcedir)/v4l2.tar.gz --strip-components=1 -C ${_kernel}

        pushd ${_kernel}
        # This is where patches would go
        popd
    done
build       : |
    for _kernel in ${kernels[@]}; do
        pushd ${_kernel}
        %ccache_zero
        export CCACHE_BASEDIR="${PWD}"
        %make LLVM=1 KDIR="%(libdir)/modules/${_kernel}" KERNELRELEASE=${_kernel}
        %ccache_stats
        popd
    done
install     : |
    for _kernel in ${kernels[@]}; do
        pushd ${_kernel}
        %install_file v4l2loopback.ko -t %(installroot)%(libdir)/modules/${_kernel}/extra/

        # Manually construct the debug info from the kernel modules
        %install_dir %(installroot)%(libdir)/debug/.build-id
        pushd %(installroot)%(libdir)/modules/${_kernel}
        module_list=()
        while IFS=  read -r -d $'\0'; do
            module_list+=("$REPLY")
        done < <(find . -type f -name "*.ko" -print0)
        for module in "${module_list[@]}"; do
            build_id=$(eu-readelf -n ${module} | awk '/Bui/ {print $3}')
            debug_path="%(libdir)/debug/.build-id/${build_id:0:2}/${build_id: 2}.debug"

            pushd $(dirname ${module})
            file=$(basename ${module})

            llvm-objcopy --only-keep-debug "${file}" "${file}.debug"
            llvm-objcopy --add-gnu-debuglink "${file}.debug" "${file}"
            llvm-strip -g --strip-unneeded "${file}"
            %install_file "${file}.debug" "%(installroot)/${debug_path}"
            rm -v "${file}.debug"

            popd
        done
        popd

        # Compress modules with zstd
        find "%(installroot)%(libdir)/modules/${_kernel}/" -name '*.ko' -print -exec zstd {} \; -exec rm -v {} \;

        popd
    done
packages    :
    # TODO: Make %(name) a virtual package that uses conditional rundeps to pull in the correct package depending on kernel(s) installed

    - "%(name)-gaming":
        summary: "%(name) built for gaming kernel"
        description: "%(name) built for gaming kernel"
        rundeps:
            - sysbinary(depmod)
            - linux-gaming
        paths:
            - /usr/lib/kernel/*.gaming/
            - /usr/lib/modules/*.gaming/

    - "%(name)-lts":
        summary: "%(name) built for LTS kernel"
        description: "%(name) built for LTS kernel"
        rundeps:
            - sysbinary(depmod)
            - linux-lts
        paths:
            - /usr/lib/kernel/*.lts/
            - /usr/lib/modules/*.lts/

    - "%(name)-stable":
        summary: "%(name) built for stable kernel"
        description: "%(name) built for stable kernel"
        rundeps:
            - sysbinary(depmod)
            - linux-stable
        paths:
            - /usr/lib/kernel/*.stable/
            - /usr/lib/modules/*.stable/
