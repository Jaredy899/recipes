name        : imv
version     : "5.0.1"
release     : 1
homepage    : https://sr.ht/~exec64/imv
upstreams   :
    - https://git.sr.ht/~exec64/imv/archive/v5.0.1.tar.gz : 8949c1df4b933b1d324e02ce49f1834a4b73dd25fa8103579e0ed105149e080e
summary     : imv is a command line image viewer intended for use with tiling window managers
description : |
    imv is a command line image viewer intended for use with tiling window managers
license     : 
    - MIT
builddeps   :
    - binary(a2x)
    - binary(git)
    - binary(xxd)
    - pkgconfig(cmocka)
    - pkgconfig(egl)
    - pkgconfig(icu-uc)
    - pkgconfig(inih)
    - pkgconfig(libheif)
    - pkgconfig(libjxl)
    - pkgconfig(libnsbmp)
    - pkgconfig(libnsgif)
    - pkgconfig(libpng)
    - pkgconfig(librsvg-2.0)
    - pkgconfig(libtiff-4)
    - pkgconfig(libturbojpeg)
    - pkgconfig(libwebp)
    - pkgconfig(opengl)
    - pkgconfig(pangocairo)
    - pkgconfig(wayland-client)
    - pkgconfig(wayland-cursor)
    - pkgconfig(wayland-egl)
    - pkgconfig(wayland-protocols)
    - pkgconfig(xkbcommon)
    - docbook
    - docbook-xsl
environment : |
    %export_docbook_catalogs
setup       : |
    %meson -Dwindows=wayland
build       : |
    %meson_build
install     : |
    %meson_install
