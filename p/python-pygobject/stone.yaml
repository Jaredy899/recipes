name        : python-pygobject
version     : "3.56.3"
release     : 18
homepage    : https://wiki.gnome.org/Projects/PyGObject
upstreams   :
    - https://download.gnome.org/sources/pygobject/3.56/pygobject-3.56.3.tar.gz : 12760e4a0e3d04b6eb95e06f7a27e362c826d567ea613373a92c003b6c70d2d6
summary     : PyGObject is a Python package which provides bindings for GObject based libraries
description : |
    PyGObject is a Python package which provides bindings for GObject based libraries such as GTK, GStreamer, WebKitGTK, GLib, GIO and many more.
license     :
    - LGPL-2.1-or-later
builddeps   :
    - binary(patchelf)
    - pkgconfig(cairo)
    - pkgconfig(cairo-gobject)
    - pkgconfig(gio-2.0)
    - pkgconfig(glib-2.0)
    - pkgconfig(gmodule-2.0)
    - pkgconfig(gobject-2.0)
    - pkgconfig(gobject-introspection-1.0)
    - pkgconfig(libffi)
    - pkgconfig(py3cairo)
    - pkgconfig(python3)
    - python(build)
    - python(installer)
    - python(packaging)
    - python(wheel)
rundeps     :
    - gobject-introspection-runtime
    - python-libs
setup       : |
    %meson
build       : |
    %meson_build
install     : |
    %meson_install
