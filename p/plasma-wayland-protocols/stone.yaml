name        : plasma-wayland-protocols
version     : "1.21.0"
release     : 6
upstreams   :
    - https://download.kde.org/stable/plasma-wayland-protocols/plasma-wayland-protocols-1.21.0.tar.xz : 698a7b28b711270314e396e248ae86087cfeaed01372009063995be6e1dc85ba
homepage    : https://kde.org/plasma-desktop
license     : LGPL-2.1-or-later
summary     : Persistent platform-independent application settings.
description : |
    Persistent platform-independent application settings.
builddeps   :
    - cmake(ECM)
    - pkgconfig(wayland-scanner)
setup       : |
    # For whatever reason one of the cmake options added by the cmake_kf6 macro tries to make this pull in qt5
    %cmake
build       : |
    %cmake_build
install     : |
    %cmake_install
packages    :
    - "%(name)-devel":
        paths:
            - /usr/share/cmake/PlasmaWaylandProtocols/
