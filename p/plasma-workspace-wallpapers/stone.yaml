name        : plasma-workspace-wallpapers
version     : "6.6.5"
release     : 16
upstreams   :
    - https://download.kde.org/stable/plasma/6.6.5/plasma-workspace-wallpapers-6.6.5.tar.xz : 4a021dbda761da7aaf7192e8d038aa1f2305a576a57f2384f54bc8ed90731418
