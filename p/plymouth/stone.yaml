name        : plymouth
version     : "26.134.222"
release     : 13
homepage    : https://www.freedesktop.org/wiki/Software/Plymouth/
upstreams   :
    - https://www.freedesktop.org/software/plymouth/releases/plymouth-26.134.222.tar.xz : 6ee1068216c5047923fabf0f6aa583e9d77cab383077358df3fc22f2ee398bb0
summary     : Graphical Boot Animation and Logger
description : |
    Graphical Boot Animation and Logger
license     : GPL-3.0
builddeps   :
    - binary(msgfmt)
    - binary(systemd-tty-ask-password-agent)
    - binary(xsltproc)
    - pkgconfig(cairo)
    - pkgconfig(dbus-1)
    - pkgconfig(freetype2)
    - pkgconfig(gtk+-3.0)
    - pkgconfig(libdrm)
    - pkgconfig(libevdev)
    - pkgconfig(libpng)
    - pkgconfig(libudev)
    - pkgconfig(ncurses)
    - pkgconfig(pango)
    - pkgconfig(pangocairo)
    - pkgconfig(systemd)
    - pkgconfig(xkbcommon)
    - pkgconfig(xkeyboard-config)
    - docbook
    - docbook-xsl
    - os-artwork
rundeps    :
    - font-cantarell
    - os-artwork
environment : |
    %export_docbook_catalogs
setup       : |
    %patch %(pkgdir)/0001-Set-plymouth-defaults.patch

    # Might need if we use git source again
    # %patch %(pkgdir)/0001-Fix-build-with-uutils-date.patch

    %meson \
        --libexecdir=lib \
        -Dlogo=/usr/share/icons/aerynos-logo-dark.png
build       : |
    %meson_build
install     : |
    %meson_install
    %install_file /usr/share/icons/aerynos-logo-dark.png %(installroot)%(datadir)/plymouth/themes/spinner/watermark.png
    %install_file %(pkgdir)/10-splash.cmdline %(installroot)%(libdir)/kernel/cmdline.d/10-splash.cmdline
