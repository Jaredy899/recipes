name        : plasma-activities
version     : "6.6.5"
release     : 23
upstreams   :
    - https://download.kde.org/stable/plasma/6.6.5/plasma-activities-6.6.5.tar.xz : 54d06a22a5765aa1e92834885d02abc7ce1bf8d6bda9533bb3472d4fef575562
homepage    : https://kde.org/plasma-desktop/
license     : GPL-2.0-or-later
summary     : Core components for the KDE Activity concept
description : |
    Core components for the KDE Activity concept
builddeps   :
    - cmake(Boost)
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6Config)
    - cmake(KF6CoreAddons)
    - cmake(Qt6CorePrivate)
    - cmake(Qt6Qml)
tuning      :
    - lto: full
    - optimize: speed
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
