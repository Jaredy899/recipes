name        : wluma
version     : "4.11.1"
release     : 3
upstreams   :
    - https://github.com/max-baz/wluma/releases/download/4.11.1/wluma-4.11.1-vendored.tar.gz : 3bfedfb607c23851e2bccef4dd5958599a3577d57e9cc5eeaa4d321aeb1ad158
homepage    : https://github.com/maximbaz/wluma
license     : ISC
summary     : Automatic brightness adjustment
description : |
    Automatic brightness adjustment based on screen contents and ALS
builddeps   :
    - pkgconfig(dbus-1)
    - pkgconfig(libudev)
    - pkgconfig(libv4l2)
    - pkgconfig(vulkan)
    # marked-man for man pages
build       : |
    %cargo_build
install     : |
    %cargo_install

    %install_file 90-wluma-backlight.rules -t %(installroot)%(udevrulesdir)
    %install_file wluma.service -t %(installroot)%(libdir)/systemd/user/
    %install_file config.toml -t %(installroot)%(datadir)/wluma/examples
