name        : yubico-authenticator
version     : "7.3.2"
release     : 1
homepage    : https://developers.yubico.com/yubioath-flutter/
upstreams   :
    - https://github.com/Yubico/yubioath-flutter/archive/refs/tags/7.3.2.tar.gz :
        hash: 6aba677eb4f2705201bdee0ca3a56711fcba94b42e679c4040c32d566c332f20
        unpackdir: yubioath
    - https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_3.41.2-stable.tar.xz :
        hash: 4a04f8a6152986d14fc137ffaf98106ca743c0f9ab66f1bc2f20ee84eb573e5c
        unpackdir: yubioath/flutter
summary     : Yubico Authenticator for Desktop (Windows, macOS and Linux) and Android
description : |
    Manage your YubiKey and access one-time passwords with this full-featured companion app to the YubiKey.
license     : Apache-2.0
builddeps  :
    - binary(cmake)
    - binary(ninja)
    - binary(which)
    - pkgconfig(ayatana-appindicator3-0.1)
    - pkgconfig(gtk+-3.0)
    - pkgconfig(libnotify)
    - python(poetry-core)
rundeps    :
    - ccid
networking : true
environment: |
    # Flutter
    export PATH="$PATH:${PWD}/flutter/bin"
setup      : |
    %patch %(pkgdir)/0001-fix-don-t-install-bundled-helper-use-system-python-h.patch
    %patch %(pkgdir)/0002-fix-execute-authenticator-helper-on-init.patch
    %patch %(pkgdir)/0003-fix-Modify-desktop-file.patch
build       : |
    pushd helper
    %pyproject_build
    popd

    # Then, build the Flutter GUI
    flutter pub get
    flutter build linux --release
install     : |
    _yubico_authenticator_root=%(libdir)/yubico-authenticator
    _yubico_authenticator_install=%(installroot)/$_yubico_authenticator_root

    pushd helper
    %pyproject_install
    popd

    %install_exe helper/authenticator-helper.py %(installroot)%(bindir)/authenticator-helper

    %install_dir ${_yubico_authenticator_install}
    cp -R build/linux/x64/release/bundle/* ${_yubico_authenticator_install}

    %install_file ${_yubico_authenticator_install}/linux_support/com.yubico.yubioath.desktop %(installroot)/%(datadir)/applications/com.yubico.yubioath.desktop
    %install_file ${_yubico_authenticator_install}/linux_support/com.yubico.yubioath.png %(installroot)/%(datadir)/icons/hicolor/128x128/apps/com.yubico.yubioath.png

    ln -srvf ${_yubico_authenticator_install}/authenticator %(installroot)%(bindir)/yubico-authenticator

    rm -frv ${_yubico_authenticator_install}/linux_support
