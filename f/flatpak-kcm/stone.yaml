name        : flatpak-kcm
version     : "6.6.5"
release     : 16
upstreams   :
    - https://download.kde.org/stable/plasma/6.6.5/flatpak-kcm-6.6.5.tar.xz : 061377c064c2ac06f77d2850e711867e91768c3c8333dffb8f2b0ba21803b01a
homepage    : https://kde.org/plasma-desktop/
license     : GPL-2.0-or-later
summary     : Flatpak Permissions Management KCM
description : |
    Flatpak Permissions Management KCM
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6Config)
    - cmake(KF6CoreAddons)
    - cmake(KF6I18n)
    - cmake(KF6IconThemes)
    - cmake(KF6ItemModels)
    - cmake(KF6KCMUtils)
    - cmake(KF6Service)
    - cmake(Qt6Quick)
    - cmake(Qt6Svg)
    - pkgconfig(flatpak)
tuning      :
    - lto: full
    - optimize: speed
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
