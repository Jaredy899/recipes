name        : faugus-launcher
version     : "1.19.3"
release     : 3
homepage    : https://github.com/Faugus/faugus-launcher
upstreams   :
    - https://github.com/Faugus/faugus-launcher/archive/refs/tags/1.19.3.tar.gz : a7cf76ef8d03978905850eb35f93265299a42b213f2f47eabecb5a23f74541da
summary     : A simple and lightweight app for running Windows games using UMU-Launcher
description : |
    A simple and lightweight app for running Windows games using UMU-Launcher
license     :
    - MIT
builddeps   :
    - binary(gtk4-update-icon-cache)
rundeps     :
    - binary(magick)
    - binary(python3)
    - python(icoextract)
    - python(pillow)
    - python(psutil)
    - python(pygobject)
    - python(requests)
    - python(vdf)
    - libayatana-appindicator
    - libcanberra
setup       : |
    %meson
build       : |
    %meson_build
install     : |
    %meson_install
