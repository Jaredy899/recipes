name        : qt6-shadertools
version     : "6.11.1"
release     : 14
homepage    : https://www.qt.io
upstreams   :
    - https://download.qt.io/official_releases/qt/6.11/6.11.1/submodules/qtshadertools-everywhere-src-6.11.1.tar.xz : 2075052f9b23bcf9de045bbd180037084942f82cce870aab14a1454902c982fc
summary     : Qt Shader Tools module
description : |
    APIs and tools in this module provide the producer functionality for the shader pipeline that allows Qt Quick to operate on Vulkan in addition to OpenGL.
license     : GPL-3.0-or-later
builddeps   :
    - cmake(Qt6CorePrivate)
    # - cmake(glslang)
rundeps     :
    - binary(spirv-opt)
setup       : |
    # Note: Disabled until Qt stops using spvremapper (removed in glslang 16.0, re-added by Qt)
    # %patch %(pkgdir)/0001-Debundle-glslang.patch
    # rm -rf src/3rdparty/glslang

    %cmake_qt6
build       : |
    %cmake_build
install     : |
    %cmake_install

    %install_dir %(installroot)/%(bindir)
    ln -srv %(installroot)/%(libdir)/qt6/bin/qsb %(installroot)/%(bindir)/qsb
