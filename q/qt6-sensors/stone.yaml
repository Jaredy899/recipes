name        : qt6-sensors
version     : "6.11.1"
release     : 8
homepage    : https://www.qt.io
upstreams   :
    - https://download.qt.io/official_releases/qt/6.11/6.11.1/submodules/qtsensors-everywhere-src-6.11.1.tar.xz : 23617062da7be526d023dec7f9b76231001a1098a7e5f94c646f2e4f87cfcf8f
summary     : Qt6 Sensors Module
description : |
    The Qt Sensors API provides access to sensor hardware via QML and C++ interfaces. The Qt Sensors API also provides a motion gesture recognition API for devices.
license     :
    - GFDL-1.3-or-later
    - GPL-3.0-or-later
    - LGPL-3.0-or-later
builddeps   :
    - cmake(Qt6CorePrivate)
    - cmake(Qt6Quick)
    - cmake(Qt6Svg)
setup       : |
    %cmake_qt6
build       : |
    %cmake_build
install     : |
    %cmake_install
