name        : mangowm
version     : "0.12.9"
release     : 3
homepage    : https://github.com/mangowm/mango
upstreams   :
        - https://github.com/mangowm/mango/archive/refs/tags/0.12.9.tar.gz : 937296e104dea6733e1a1f2e5474900fd2bb536aaec0735b135a5e524302770a
summary     : A Wayland compositor with smooth animation
description : |
    A wayland compositor utilizing wlroots as a base and SceneFX for aesthetics
license     :
    - GPL-3.0-or-later
builddeps   :
    - pkgconfig(libpcre2-8)
    - pkgconfig(scenefx)
    - pkgconfig(wayland-protocols)
    - pkgconfig(wlroots)
setup       : |
    %patch %(pkgdir)/stateless-config.patch
    %meson
build       : |
    %meson_build
install     : |
    %meson_install
