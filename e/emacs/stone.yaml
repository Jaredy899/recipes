name        : emacs
version     : "30.2"
release     : 2
homepage    : https://www.gnu.org/software/emacs
upstreams   :
    # GNU mirror
    - https://www.artfiles.org/gnu.org/emacs/emacs-30.2.tar.gz:
        hash: 1d79a4ba4d6596f302a7146843fe59cf5caec798190bcc07c907e7ba244b076d
        unpackdir: emacs # For some reason the default emacs-30.2.tar.gz path breaks the build
summary     : An extensible, customizable, free/libre text editor — and more.
description : |
    At its core is an interpreter for Emacs Lisp, a dialect of the Lisp programming language with extensions to support text editing.
license     :
    - GPL-3.0-or-later
builddeps   :
    - binary(ld)
    - binary(makeinfo)
    - binary(tar)
    - pkgconfig(alsa)
    - pkgconfig(cairo)
    - pkgconfig(dbus-1)
    - pkgconfig(fontconfig)
    - pkgconfig(freetype2)
    - pkgconfig(gdk-3.0)
    - pkgconfig(gdk-pixbuf-2.0)
    - pkgconfig(glib-2.0)
    - pkgconfig(gmp)
    - pkgconfig(gnutls)
    - pkgconfig(harfbuzz)
    - pkgconfig(jansson)
    - pkgconfig(lcms2)
    - pkgconfig(libacl)
    - pkgconfig(libattr)
    - pkgconfig(libjpeg)
    - pkgconfig(libpng)
    - pkgconfig(librsvg-2.0)
    - pkgconfig(libtiff-4)
    - pkgconfig(tree-sitter)
    - pkgconfig(libwebp)
    - pkgconfig(libxml-2.0)
    - pkgconfig(ncurses)
    - pkgconfig(pango)
    - pkgconfig(smartcols)
    - pkgconfig(sqlite3)
    - pkgconfig(systemd)
    - pkgconfig(xfixes)
    - pkgconfig(xpm)
    - pkgconfig(zlib)
    - giflib-devel
    - gpm-devel
    - libgccjit-devel
    # libselinux
toolchain   : gnu # Required for libgccjit
setup       : |
    %patch %(pkgdir)/upstream-01.patch
    %patch %(pkgdir)/upstream-02.patch
    %patch %(pkgdir)/upstream-03.patch

    # find lisp -type f -name "*.elc" -delete -print

    # reconfigure for webp patch
    %reconfigure \
        --sysconfdir=%(vendordir) \
        --infodir=%(datadir)/%(name)/info \
        --disable-build-details \
        --enable-link-time-optimization \
        --with-cairo \
        --with-harfbuzz \
        --with-libsystemd \
        --with-modules \
        --with-native-compilation=aot \
        --with-pgtk \
        --with-tree-sitter \
        --without-compress-install \
        --without-x
build       : |
    %make
install     : |
    %make_install
