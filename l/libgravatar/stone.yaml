name        : libgravatar
version     : "26.04.1"
release     : 13
upstreams   :
    - https://download.kde.org/stable/release-service/26.04.1/src/libgravatar-26.04.1.tar.xz : 09e468307448e8d77b0d94ce6defd2a2e61acc476ca6f294ba05da76c16d95c6
homepage    : https://kde.org
license     :
    - GPL-2.0-only
    - LGPL-2.1-or-later
summary     : KDE PIM library providing Gravatar support
description : |
    KDE PIM library providing Gravatar support.
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6Config)
    - cmake(KF6ConfigWidgets)
    - cmake(KF6CoreAddons)
    - cmake(KF6I18n)
    - cmake(KF6WidgetsAddons)
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
