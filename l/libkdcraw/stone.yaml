name        : libkdcraw
version     : "26.04.1"
release     : 15
upstreams   :
    - https://download.kde.org/stable/release-service/26.04.1/src/libkdcraw-26.04.1.tar.xz : dc898b7488f84c1e286d47775a0562402c954647dab622719d9f953d90bd9aef
homepage    : https://kde.org/
license     :
    - GFDL-1.2-or-later
    - GPL-2.0-or-later
summary     : C++ interface to LibRaw
description : |
    Libkdcraw is a C++ interface around LibRaw library used to decode RAW picture files.
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - pkgconfig(libraw)
setup       : |
    %cmake_kf6 \
        -DBUILD_WITH_QT6=ON
build       : |
    %cmake_build
install     : |
    %cmake_install
