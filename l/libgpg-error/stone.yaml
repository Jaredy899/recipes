name        : libgpg-error
version     : "1.61"
release     : 11
homepage    : https://www.gnupg.org/related_software/libgpg-error
upstreams   :
    - https://www.gnupg.org/ftp/gcrypt/libgpg-error/libgpg-error-1.61.tar.bz2 : 7a85413f2bc354f4f8aa832b718af122e48965e9e0eb9012ee659c13c6385c93
summary     : Common code of all GnuPG components
description : |
    %(name) is a small library that originally defined common error values for all GnuPG components. Among these are GPG, GPGSM, GPGME, GPG-Agent, libgcrypt, Libksba, DirMngr, Pinentry, SCdaemon. Because Libgpg-error is a common dependency all GnuPG components, more features have been added to the library.
license     :
    - GPL-2.0-or-later
    - LGPL-2.1-or-later
builddeps   :
    - binary(msgfmt)
    - pkgconfig(readline)
setup       : |
    %configure \
        --disable-languages
build       : |
    %make
install     : |
    %make_install
check       : |
    %make check
packages    :
    - "%(name)-devel":
        paths:
            - /usr/bin/gpgrt-config
            - /usr/bin/yat2m
            - /usr/share/info/gpgrt.info
            - /usr/share/man/man1/gpgrt-config.1
