name        : linux-stable
version     : "7.0.7"
release     : 33
homepage    : https://kernel.org/
upstreams   :
    - https://cdn.kernel.org/pub/linux/kernel/v7.x/linux-7.0.7.tar.xz : c8e1fe86a3aaff2de6f7401383f959283510c389ff84c15ab711c8fbceb25df4
summary     : The Linux Kernel - Stable
description : |
    The Linux Kernel - Stable

    This package provides the Linux Kernel. It is built with the LLVM compiler and the LLD linker.
license     :
    - GPL-2.0-only
builddeps   :
    - binary(bc)
    - binary(bindgen)
    - binary(bison)
    - binary(dash)
    - binary(dbus-broker)
    - binary(dracut)
    - binary(eu-readelf)
    - binary(flex)
    - binary(gpg)
    - binary(grep)
    - binary(gzip)
    - binary(kmod)
    - binary(less)
    - binary(loadkeys)
    - binary(m4)
    - binary(moss)
    - binary(pahole)
    - binary(perl)
    - binary(python3)
    - binary(rsync)
    - binary(rustc)
    - binary(setfont)
    - binary(tr)
    - binary(which)
    - pkgconfig(gmp)
    - pkgconfig(libelf)
    - pkgconfig(libssl)
    - pkgconfig(libzstd)
    - pkgconfig(mpfr)
    - pkgconfig(ncursesw) # for 'make nconfig' in chroot
    - pkgconfig(ply-boot-client)
    - sysbinary(cryptsetup)
    - sysbinary(fsck.ext4)
    - sysbinary(fsck.f2fs)
    - sysbinary(fsck.xfs)
    - sysbinary(lvm)
    - font-cantarell
    - intel-microcode
    - libgcc # libgcc_s.so.1 - needed until we get llvm-libgcc
    - linux-firmware-amd-graphics
    - linux-firmware-amd64-microcode
    - linux-firmware-intel-graphics
    - linux-firmware-nvidia-graphics
    - rust-devel # Needs Rust source
    - serpent-artwork
    - systemd # Needs the actual init binary
environment : |
    # Maximize ccache efficiency as well as make the build fully reproducible, except for the initrd which needs a timestamp to be signed
    export KBUILD_BUILD_USER=root
    export KBUILD_BUILD_TIMESTAMP=$(date --utc --date=@$SOURCE_DATE_EPOCH +%%F)

    _common_make_args="CC=%(cc) LD=%(ld) ARCH=x86_64 LLVM=1 LLVM_IAS=1 WERROR=0"
    _common_make_build_args="${_common_make_args} VERBOSE=0 V=0"
setup       : |
    if [[ -f %(pkgdir)/patches/series ]]
    then
        # This retains patch order while removings blank lines
        # and lines starting with a # character (with any number of preceding blanks)
        # which should make the patch series file nicer to maintain due to comment support
        PATCHES=($(sed -E -e '/^\s*$/d' -e '/^[[:space:]]*#.*$/d' %(pkgdir)/patches/series))
        for p in "${PATCHES[@]}"
        do
            %patch "%(pkgdir)/patches/${p}"
        done
    fi

    extraVersion="-%(release).stable"
    sed -e "s/EXTRAVERSION =.*/EXTRAVERSION = $extraVersion/" -i Makefile

    # Make sure the kernel version is consistent with the package version, even if we are using a different source
    # We might do this if we're bisecting and don't want to mess with creating many different module dirs.
    major="$( cut -d '.' -f 1 <<< "%(version)" )"
    patch="$( cut -d '.' -f 2 <<< "%(version)" )"
    sub="$( cut -d '.' -f 3 <<< "%(version)" )"
    sed -e "s/^VERSION =.*/VERSION = $major/" -i Makefile
    sed -e "s/^PATCHLEVEL =.*/PATCHLEVEL = $patch/" -i Makefile
    sed -e "s/^SUBLEVEL =.*/SUBLEVEL = $sub/" -i Makefile

    %install_file %(pkgdir)/config-x86_64 .config
    %make ${_common_make_args} oldconfig || exit 1
build       : |
    %ccache_zero
    # Do NOT use CONFIG_DEBUG_SECTION_MISMATCH as it is GCC specific
    %make ${_common_make_build_args}
    %make -C tools/objtool ${_common_make_build_args}
    %ccache_stats

    ################################################################################
    #
    # linux-headers below this block.
    #
    # If you are copying this recipe for a variant kernel (linux-lts/linux-gaming)
    #  DO NOT include anything below this.
    #
    ################################################################################

    # linux-headers
    %make ${_common_make_build_args} headers
install     : |
    umask 022
    kernelVersion="%(version)-%(release).stable"
    %install_exe arch/x86/boot/bzImage %(installroot)%(libdir)/kernel/$kernelVersion/vmlinuz

    %install_file .config %(installroot)%(libdir)/kernel/$kernelVersion/config
    %install_file System.map %(installroot)%(libdir)/kernel/$kernelVersion/System.map

    # Modules please
    %install_dir %(installroot)%(libdir)/modules/$kernelVersion
    %make ${_common_make_args} INSTALL_MOD_PATH=%(installroot)/usr modules_install KERNELRELEASE="$kernelVersion" mod-fw= DEPMOD=/usr/bin/true

    # Manually construct the debug info from the kernel modules
    %install_dir %(installroot)%(libdir)/debug/.build-id
    pushd %(installroot)
    module_list=()
    while IFS=  read -r -d $'\0'; do
        module_list+=("$REPLY")
    done < <(find .%(libdir)/modules -type f -name "*.ko" -print0)
    for module in "${module_list[@]}"; do
        build_id=$(eu-readelf -n ${module} | awk '/Bui/ {print $3}')
        debug_path="%(libdir)/debug/.build-id/${build_id:0:2}/${build_id: 2}.debug"

        pushd $(dirname ${module})
        file=$(basename ${module})

        llvm-objcopy --only-keep-debug "${file}" "${file}.debug"
        llvm-objcopy --add-gnu-debuglink "${file}.debug" "${file}"
        llvm-strip -g --strip-unneeded "${file}"
        %install_file "${file}.debug" "%(installroot)/${debug_path}"
        rm -v "${file}.debug"

        popd
    done
    popd
    /usr/sbin/depmod -b %(installroot)/usr ${kernelVersion} -a

    # We can make the initrd smaller by decompressing the firmware prior to compressing the entire initrd.
    mkdir -p usr/lib/firmware/
    cp -ra /usr/lib/firmware/* usr/lib/firmware
    file_list=()
    while IFS=  read -r -d $'\0'; do
        file_list+=("$REPLY")
    done < <(find usr/lib/firmware -type f -print0)
    for file in "${file_list[@]}"; do
        if [ -z ${file##*.zst} ]; then
            unzstd --rm "$file"
        fi
    done

    # Update symlinks
    link_list=()
    while IFS=  read -r -d $'\0'; do
        link_list+=("$REPLY")
    done < <(find usr/lib/firmware -type l -print0)
    for file in "${link_list[@]}"; do
        link=$(readlink "$file")
        if [ -z ${link##*.zst} ]; then
            new_link="${link%.zst}"
            ln -sfv "$new_link" "$file"
        fi
        if [ -z ${file##*.zst} ]; then
            new_filename="${file%.zst}"
            mv -v "$file" "$new_filename"
        fi
    done

    # Include early microcode
    # 2025-07-29: Add vfio kernel modules to initrd as they need to be loaded very early in the boot process
    drm_modules="amdgpu hyperv_drm i915 nouveau qxl radeon simpledrm vboxvideo virtio-gpu vmwgfx xe"
    vfio_modules="vfio_pci vfio_iommu_type1"
    PATH="/usr/bin:/usr/sbin" dracut \
        --add "bash rescue systemd drm virtiofs lvm dm moss zz-init-extension" \
        --add-drivers "${drm_modules} ${vfio_modules}" \
        --early-microcode \
        --force \
        --fwdir usr/lib/firmware/ \
        --hardlink \
        --include %(pkgdir)/initrd/50-protectsystem-off.conf %(libdir)/systemd/system.conf.d/50-protectsystem-off.conf \
        --include %(pkgdir)/initrd/timeouts.conf %(libdir)/systemd/system.conf.d/timeouts.conf \
        --kmoddir %(installroot)%(libdir)/modules/${kernelVersion} \
        --kver $kernelVersion \
        --no-hostonly \
        --nolvmconf \
        --nomdadmconf \
        --strip \
        --reproducible \
        --tmpdir /tmp \
        --verbose \
        --zstd \
        %(installroot)%(libdir)/kernel/$kernelVersion/50-default.initrd

    # Temporary: Help with VMs
    ln -s $kernelVersion/50-default.initrd %(installroot)%(libdir)/kernel/current.stable.initrd
    ln -s $kernelVersion/vmlinuz %(installroot)%(libdir)/kernel/current.stable.kernel
    %install_file %(pkgdir)/boot.json %(installroot)%(libdir)/kernel/$kernelVersion/boot.json
    sed -e 's/@VERSION@/%(version)-%(release).stable/g' -i %(installroot)%(libdir)/kernel/$kernelVersion/boot.json

    # Install kernel headers (for modules)
    headerRoot="/usr/src/linux-headers-%(version)-%(release).stable"
    dstDir="%(installroot)$headerRoot"
    %install_dir $dstDir

    # Copy core build files
    find . -type f \( -name 'Makefile*' -o -name 'Kconfig*' -o -name 'Kbuild*' -o -name '*.sh' -o -name '*.pl' -o -name '*.lds' \) -exec cp --parents {} $dstDir \;

    # Copy headers and essential directories
    for i in include scripts Documentation ; do
        cp -R $i $dstDir/
    done

    # Copy architecture specific headers
    (find arch -name include -type d -print | xargs -n1 -i: find : -type f) | cpio -pd --preserve-modification-time $dstDir

    # Media driver headers
    for dir in "drivers/media/dvb-frontends" "drivers/media/tuners"; do
        find $dir -name "*.h" -exec cp --parents {} $dstDir \;
    done
    find drivers/media/platform -name "*.h" -exec cp --parents {} $dstDir \;

    # Clean unnecessary files
    find $dstDir/scripts -name "*.o" -delete

    # Copy build requirements
    for i in Module.symvers System.map .config ; do
        %install_file $i $dstDir/
    done
    %install_exe tools/objtool/objtool $dstDir/tools/objtool/objtool
    chmod 00755 $dstDir/scripts/basic/fixdep

    # Set up module symlinks
    rm -vf %(installroot)%(libdir)/modules/$kernelVersion/build || :
    rm -vf %(installroot)%(libdir)/modules/$kernelVersion/source || :
    ln -svf build %(installroot)%(libdir)/modules/$kernelVersion/source
    ln -svf $headerRoot %(installroot)%(libdir)/modules/$kernelVersion/build

    # Compress modules with zstd
    find "%(installroot)%(libdir)/modules" -name '*.ko' -print -exec zstd {} \; -exec rm -v {} \;

    ################################################################################
    #
    # linux-headers below this block.
    #
    # If you are copying this recipe for a variant kernel (linux-lts/linux-gaming)
    #  DO NOT include anything below this.
    #
    ################################################################################

    # linux-headers
    %make ${_common_make_build_args} INSTALL_HDR_PATH=%(installroot)%(prefix) headers_install

packages    :
    - "%(name)-devel":
        paths:
            - /usr/lib/modules/*/build
            - /usr/src/

    - "linux-headers":
        summary: Linux kernel libc headers
        description: Headers for the kernel libc interface
        paths:
            - /usr/include/
