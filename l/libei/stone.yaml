name        : libei
version     : "1.6.0"
release     : 7
homepage    : https://gitlab.freedesktop.org/libinput/libei
upstreams   :
    - https://gitlab.freedesktop.org/libinput/libei/-/archive/1.6.0/libei-1.6.0.tar.gz : 81b4b967f0e5938492434a04f7ea2e6c6d96d3e6c44700bc691821f82281e602
summary     : Library for emulated input
description : |
    libei is a library for Emulated Input, primarily aimed at the Wayland
    stack. It provides three parts:

    🥚 EI (Emulated Input) for the client side (libei)
    🍦 EIS (Emulated Input Server) for the server side (libeis)
    🚌 oeffis is an optional helper library for DBus communication with the XDG RemoteDesktop portal (liboeffis)
license     :
    - MIT
builddeps   :
    - binary(python3)
    - binary(xmllint)
    - pkgconfig(libevdev)
    - pkgconfig(libsystemd)
    - pkgconfig(xkbcommon)
    - python(attrs)
    - python(jinja2)
    # TODO: Ruff
setup       : |
    %meson \
        -Dtests=disabled
build       : |
    %meson_build
install     : |
    %meson_install
packages    :
    - "%(name)-utils":
        summary: Utilities to test and/or debug emulated input devices
        description: Utilities to test and/or debug emulated input devices
        paths:
            - /usr/bin/ei-debug-events

    - "libeis":
        summary: Library for Emulated Input Servers
        description: Library for Emulated Input Servers
        paths:
            - /usr/lib/libeis.so.*

    - "liboeffis":
        summary: Library for XDG RemoteDesktop Portal Setup
        description: Library for XDG RemoteDesktop Portal Setup
        paths:
            - /usr/lib/liboeffis.so.*

    - "%(name)-devel":
        rundeps:
            - libeis
            - liboeffis
