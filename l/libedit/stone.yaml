name        : libedit
version     : "20260508-3.1"
release     : 6
summary     : Command line editor library providing generic line editing, history, and tokenization functions
license     : BSD-3-Clause
homepage    : https://thrysoee.dk/editline/
description : |
    Command line editor library providing generic line editing, history, and tokenization functions
upstreams   :
    - https://thrysoee.dk/editline/libedit-20260508-3.1.tar.gz: 91f42d6571dd8d92faedd1341134ce5abca0c5d0b4b352814186d33f2b11272e
builddeps   :
    - pkgconfig(ncursesw)
setup       : |
    %configure
build       : |
    %make V=1
install     : |
    %make_install
tuning      :
    - lto: full
    - optimize: generic
    - sections
packages    :
    - "%(name)-devel":
        paths:
            - /usr/share/man/man7

    - "%(name)-static":
        paths:
            - /usr/lib/lib*.a
        rundeps:
            - "%(name)-devel"
            - "ncurses-static"
