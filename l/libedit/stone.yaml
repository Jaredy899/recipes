name        : libedit
version     : "20260512-3.1"
release     : 7
summary     : Command line editor library providing generic line editing, history, and tokenization functions
license     : BSD-3-Clause
homepage    : https://thrysoee.dk/editline/
description : |
    Command line editor library providing generic line editing, history, and tokenization functions
upstreams   :
    - https://thrysoee.dk/editline/libedit-20260512-3.1.tar.gz: 432d5e7ea8b0116dd39f2eca7bc11d0eed77faa6b77ea526ace89907c23ea4a0
builddeps   :
    - pkgconfig(ncursesw)
setup       : |
    %configure
build       : |
    %make V=1
install     : |
    %make_install
tuning      :
    - lto: full
    - optimize: generic
    - sections
packages    :
    - "%(name)-devel":
        paths:
            - /usr/share/man/man7

    - "%(name)-static":
        paths:
            - /usr/lib/lib*.a
        rundeps:
            - "%(name)-devel"
            - "ncurses-static"
