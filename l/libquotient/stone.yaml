name        : libquotient
version     : "0.9.6.1"
release     : 12
homepage    : https://quotient-im.github.io/libQuotient/
upstreams   :
    - https://github.com/quotient-im/libQuotient/archive/refs/tags/0.9.6.1.tar.gz : ac0fe5df480fa893d3e16da626bf5028c944e9b41f504f6fe0fe49273247d636
summary     : GnuPG Made Easy library (C++ bindings)
description : |
    GnuPG Made Easy library (C++ bindings)
license     : LGPL-2.1-or-later
builddeps   :
    - cmake(Olm)
    - cmake(Qt6Core)
    - cmake(Qt6CorePrivate)
    - cmake(Qt6Keychain)
    - pkgconfig(libcrypto)
setup       : |
    %cmake \
        -DBUILD_SHARED_LIBS=ON \
        -DQuotient_INSTALL_TESTS:BOOL=OFF
build       : |
    %cmake_build
install     : |
    %cmake_install

    # remove android bits
    rm -rfv %(installroot)/usr/share
packages    :
    - "%(name)-devel":
        rundeps:
            - cmake(Olm)
            - pkgconfig(libcrypto)
