name        : kldap
version     : "26.04.1"
release     : 13
upstreams   :
    - https://download.kde.org/stable/release-service/26.04.1/src/kldap-26.04.1.tar.xz : 4a63ce62cbb12d9c0dfc7502f1f83cf79296e2ee6785ba283e7872c527c3dc59
homepage    : https://kde.org
license     : LGPL-2.1-or-later
summary     : Allows LDAP accessing with a convenient Qt style C++ API
description : |
    Allows LDAP accessing with a convenient Qt style C++ API.
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6DocTools)
    - cmake(KF6I18n)
    - cmake(KF6KIO)
    - cmake(Qt6Keychain)
    - pkgconfig(ldap)
    - pkgconfig(libsasl2)
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
