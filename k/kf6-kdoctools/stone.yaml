    - pkgconfig(libxslt)
    - docbook
    - docbook-xsl
    - perl-uri
rundeps     :
    - docbook
    - docbook-xsl
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
