name        : kf6-kpackage
version     : "6.26.0"
release     : 17
upstreams   :
    - https://download.kde.org/stable/frameworks/6.26/kpackage-6.26.0.tar.xz : 313cda4a335ecdb67bb8e2fcc15bdeb5970db17d5597282ca655bf97a98abab5
homepage    : https://community.kde.org/Frameworks
license     :
    - GPL-2.0-or-later
    - LGPL-2.0-or-later
summary     : Installation and loading of additional content as packages
description : |
    Installation and loading of additional content (scripts, images...) as packages.
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6Archive)
    - cmake(KF6CoreAddons)
    - cmake(KF6DocTools)
    - cmake(KF6I18n)
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
