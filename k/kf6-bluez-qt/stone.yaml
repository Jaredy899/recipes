name        : kf6-bluez-qt
version     : "6.26.0"
release     : 19
upstreams   :
    - https://download.kde.org/stable/frameworks/6.26/bluez-qt-6.26.0.tar.xz : ebeb301eaeb6ec6729b27969556839165ba582ebe242b42cde71c8faa80d63df
homepage    : https://community.kde.org/Frameworks
license     : LGPL-2.1-only
summary     : Qt wrapper for BlueZ 5 DBus API
description : |
    BluezQt is a library for communication with BlueZ system and session daemons.
    * Manager class is used to communicate with system daemon - org.bluez
    * ObexManager class is used to communicate with session daemon - org.bluez.obex
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(Qt6CorePrivate)
    - cmake(Qt6Qml)
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
