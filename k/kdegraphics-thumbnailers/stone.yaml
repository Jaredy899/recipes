name        : kdegraphics-thumbnailers
version     : "26.04.1"
release     : 12
upstreams   :
    - https://download.kde.org/stable/release-service/26.04.1/src/kdegraphics-thumbnailers-26.04.1.tar.xz : 684fe7c8bd600b99909908f816189940a3e4b8fcf3151e52db798342f529c200
homepage    : https://apps.kde.org/kdegraphics_thumbnailers/
license     : GPL-2.0-or-later
summary     : Thumbnailers for various graphics file formats
description : |
    Thumbnailers for various graphics file formats
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KDcrawQt6)
    - cmake(KExiv2Qt6)
    - cmake(KF6Archive)
    - cmake(KF6KIO)
    - cmake(QMobipocket6)
setup       : |
    %cmake_kf6 \
        -DBUILD_WITH_QT6=ON
build       : |
    %cmake_build
install     : |
    %cmake_install
