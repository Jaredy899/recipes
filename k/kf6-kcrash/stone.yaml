name        : kf6-kcrash
version     : "6.26.0"
release     : 17
upstreams   :
    - https://download.kde.org/stable/frameworks/6.26/kcrash-6.26.0.tar.xz : d05d93863a745ce0d4ab8ccff684a84a813ee4cbcc68c9c7a5175107b107e931
