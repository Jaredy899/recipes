name        : kdegraphics-mobipocket
version     : "26.04.1"
release     : 13
upstreams   :
    - https://download.kde.org/stable/release-service/26.04.1/src/kdegraphics-mobipocket-26.04.1.tar.xz : de353837314402f4983893226483a88a9026266b53ddf64b07ef234d149ff7bd
homepage    : https://invent.kde.org/graphics/kdegraphics-mobipocket
license     : GPL-2.0-or-later
summary     : Plugins for mobipocket
description : |
    A collection of plugins to handle mobipocket files.
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(Qt6Core5Compat)
setup       : |
    %cmake_kf6 \
        -DBUILD_WITH_QT6=ON
build       : |
    %cmake_build
install     : |
    %cmake_install
