name        : kdecoration
version     : "6.6.5"
release     : 19
upstreams   :
    - https://download.kde.org/stable/plasma/6.6.5/kdecoration-6.6.5.tar.xz : 06e8ed04b8f3cdcd3057a9e2d23291ef41a3976f96fc8cf917479218871aa9fd
homepage    : https://kde.org/plasma-desktop/
license     : LGPL-2.1-only
summary     : Plugin based library to create window decorations
description : |
    Plugin based library to create window decorations
builddeps   :
