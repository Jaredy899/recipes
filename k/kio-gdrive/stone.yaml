name        : kio-gdrive
version     : "26.04.1"
release     : 15
upstreams   :
    - https://download.kde.org/stable/release-service/26.04.1/src/kio-gdrive-26.04.1.tar.xz : 53a4fee5e3e0f4dad9afad0b236da2d22f1af82c77cc8ca5c9030cd113684d45
homepage    : https://apps.kde.org/kio_gdrive/
license     : GPL-2.0-only
summary     : KIO access for Google Drive
description : |
    KIO GDrive enables KIO-aware applications (such as Dolphin, Kate or Gwenview) to access and edit Google Drive files on the cloud.
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KAccounts6)
    - cmake(KF6DocTools)
    - cmake(KF6I18n)
    - cmake(KF6KIO)
    - cmake(KF6Notifications)
    - cmake(KF6Purpose)
    - cmake(KPim6GAPI)
rundeps     :
    - kaccounts-providers
    - accounts-qml-module-qt6 # QML dep
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
