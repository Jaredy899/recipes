name        : kpmcore
version     : "26.04.1"
release     : 13
upstreams   :
    - https://download.kde.org/stable/release-service/26.04.1/src/kpmcore-26.04.1.tar.xz : d14b349f16bdbbc26086e5eeea71e2fe7d657157fa0721ef3952ea439ee96f9b
homepage    : https://invent.kde.org/system/kpmcore
license     : GPL-3.0-or-later
summary     : Library for managing partitions
description : |
    Common code for KDE Partition Manager and other projects. Library for managing partitions.
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6CoreAddons)
    - cmake(KF6I18n)
    - cmake(KF6WidgetsAddons)
    - cmake(PolkitQt6-1)
    - pkgconfig(blkid)
# rundeps     :
#     - qt6-wayland
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
