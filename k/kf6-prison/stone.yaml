name        : kf6-prison
version     : "6.26.0"
release     : 21
upstreams   :
    - https://download.kde.org/stable/frameworks/6.26/prison-6.26.0.tar.xz : 0414ddc310bca5eecfc1a6f9d4463b8a6d81894db4128ac43b4f8c1e14b73b5b
homepage    : https://community.kde.org/Frameworks
license     :
    - BSD-3-Clause
    - MIT
summary     : Qt api to produce QRCode barcode
description : |
    Qt api to produce QRCode barcode
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(Qt6CorePrivate)
    - cmake(Qt6Multimedia)
    - cmake(Qt6Quick)
    - pkgconfig(libdmtx)
    - pkgconfig(libqrencode)
    - pkgconfig(zxing)
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
