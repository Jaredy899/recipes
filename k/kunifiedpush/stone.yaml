name        : kunifiedpush
version     : "26.04.1"
release     : 13
upstreams   :
    - https://download.kde.org/stable/release-service/26.04.1/src/kunifiedpush-26.04.1.tar.xz : 4be7f9343bc2336484847ff46f2cdd26ec869a851fd0072a4d0b933d888708cf
homepage    : https://invent.kde.org/libraries/kunifiedpush
license     : LGPL-2.0-or-later
summary     : UnifiedPush client library
description : |
    UnifiedPush client library and distributor daemon
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6CoreAddons)
    - cmake(KF6Crash)
    - cmake(KF6I18n)
    - cmake(KF6KCMUtils)
    - cmake(KF6Service)
    - cmake(KF6Solid)
    - cmake(Qt6WebSockets)
    - pkgconfig(openssl)
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
