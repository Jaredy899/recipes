name        : kmbox
version     : "26.04.1"
release     : 14
upstreams   :
    - https://download.kde.org/stable/release-service/26.04.1/src/kmbox-26.04.1.tar.xz : 3f45c677859e15ec16be4c710811022931629cccf29999282ecf63583233bccc
homepage    : https://kde.org
license     : LGPL-2.1-or-later
summary     : KMBox provides API to access emails in storages in the MBox format
description : |
    KMBox provides API to access emails in storages in the MBox format.
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KPim6Mime)
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
packages    :
    - "%(name)-devel":
        rundeps:
            - cmake(KPim6Mime)
