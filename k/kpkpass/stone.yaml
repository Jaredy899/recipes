name        : kpkpass
version     : "26.04.1"
release     : 16
upstreams   :
    - https://download.kde.org/stable/release-service/26.04.1/src/kpkpass-26.04.1.tar.xz : 1080d0fd3aeac7b19398181e0e12f06cf420f1497e80e5bb055f24048a827eb1
homepage    : https://invent.kde.org/pim/kpkpass
license     : LGPL-2.1-or-later
summary     : Apple Wallet Pass reader
description : |
    Library to deal with Apple Wallet pass files.
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6Archive)
    - cmake(Qt6Qml)
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
packages    :
    - "%(name)-devel":
        rundeps:
            - cmake(KF6Archive)
