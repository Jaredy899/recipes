name        : kmime
version     : "26.04.1"
release     : 14
upstreams   :
    - https://download.kde.org/stable/release-service/26.04.1/src/kmime-26.04.1.tar.xz : 79616a7bc28710f8f2fc4e7eee53342e83c58969eef09ba70e63ee2017472e6a
homepage    : https://kde.org
license     : LGPL-2.1-or-later
summary     : KMime is a library for handling mail messages and newsgroup articles
description : |
    KMime is a library for handling mail messages and newsgroup articles.
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6Codecs)
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
packages    :
    - "%(name)-devel":
        rundeps:
            - cmake(KF6Codecs)
