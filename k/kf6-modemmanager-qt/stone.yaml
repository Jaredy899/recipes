name        : kf6-modemmanager-qt
version     : "6.26.0"
release     : 13
upstreams   :
    - https://download.kde.org/stable/frameworks/6.26/modemmanager-qt-6.26.0.tar.xz : bef456ac0a5983bcc14a1580cb0d32a001241f380d901cb503613855380af3a5
homepage    : https://community.kde.org/Frameworks
license     :
    - BSD-3-Clause
    - GPL-2.0-only
    - LGPL-2.1-only
summary     : Qt wrapper for ModemManager DBus API
description : |
    Qt wrapper for ModemManager DBus API
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - pkgconfig(ModemManager)
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
packages    :
    - "%(name)-devel":
        rundeps:
            - pkgconfig(ModemManager)
