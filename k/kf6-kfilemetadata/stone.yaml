    - cmake(KF6Config)
    - cmake(KF6CoreAddons)
    - cmake(KF6I18n)
    - cmake(QMobipocket6)
    - cmake(exiv2)
    - cmake(taglib)
    - pkgconfig(libattr)
    - pkgconfig(libavcodec)
