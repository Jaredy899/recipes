name        : kf6-kpty
version     : "6.26.0"
release     : 17
upstreams   :
    - https://download.kde.org/stable/frameworks/6.26/kpty-6.26.0.tar.xz : 7613c26cfaa7465a2fe28a22762ceb38266414e7f4a94a127c09dc0628625553
homepage    : https://community.kde.org/Frameworks
license     :
    - BSD-3-Clause
    - GPL-2.0-or-later
