name        : kf6-ki18n
version     : "6.26.0"
release     : 25
upstreams   :
    - https://download.kde.org/stable/frameworks/6.26/ki18n-6.26.0.tar.xz : 484aad486bfafef6c86d8d5b26529258e67c74c96250c1ac212ddf568448c7c0
homepage    : https://community.kde.org/Frameworks
license     :
    - BSD-3-Clause
    - LGPL-2.0-only
    - LGPL-2.0-or-later
    - LGPL-2.1-only
summary     : KDE Gettext-based UI text internationalization.
description : |
    KDE Gettext-based UI text internationalization.
builddeps   :
    - binary(msgmerge) # gettext
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(Qt6CorePrivate)
    - cmake(Qt6Qml)
    - pkgconfig(iso-codes)
rundeps     :
    - binary(msgmerge)
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
