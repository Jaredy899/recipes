name        : kvantum
version     : "1.1.7"
release     : 4
upstreams   :
    - https://github.com/tsujan/Kvantum/releases/download/V1.1.7/Kvantum-1.1.7.tar.xz : 0f6e8846ba3f9e2f2e41f833c54b2b0e440b81ff9ffc15221690fafef77f4b58
