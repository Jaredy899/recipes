name        : kf6-kcompletion
version     : "6.26.0"
release     : 18
upstreams   :
    - https://download.kde.org/stable/frameworks/6.26/kcompletion-6.26.0.tar.xz : 95f71eb807e4de40ecdfe7234c9c3d844423171ac52588aecca642f78d904e48
homepage    : https://community.kde.org/Frameworks
license     :
    - BSD-3-Clause
    - LGPL-2.0-or-later
    - LGPL-2.1-or-later
summary     : Powerful completion framework, including completion-enabled lineedit and combobox.
description : |
    Powerful completion framework, including completion-enabled lineedit and combobox.
builddeps   :
