name        : ksanecore
version     : "26.04.1"
release     : 10
upstreams   :
    - https://download.kde.org/stable/release-service/26.04.1/src/ksanecore-26.04.1.tar.xz : 72adb895213faecd2782d7cd2d5125f2cd8ef405e6f4653f3d706a49159205e2
homepage    : https://invent.kde.org/libraries/ksanecore
license     :
    - LGPL-2.1-only
    - LGPL-3.0-only
summary     : Library providing logic to interface scanners
description : |
    KSaneCore is a library that provides a Qt interface for the SANE library for scanner hardware.
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6I18n)
    - pkgconfig(sane-backends)
setup       : |
    %cmake_kf6
build       : |
    %cmake_build
install     : |
    %cmake_install
