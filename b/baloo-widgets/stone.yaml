name        : baloo-widgets
version     : "26.04.1"
release     : 18
upstreams   :
    - https://download.kde.org/stable/release-service/26.04.1/src/baloo-widgets-26.04.1.tar.xz : 687856a4390680ad1584ff2edf8d7eed5857be6a51ca485600b521bd82ebdcd0
homepage    : https://community.kde.org/Baloo
license     : LGPL-2.1-only
