name        : glaze
version     : "7.6.0"
release     : 7
upstreams   :
    - https://github.com/stephenberry/glaze/archive/refs/tags/v7.6.0.tar.gz : 839cd7bd2bda4db1a4e973f18851c2ecdccf82c75512453f68b2389d43a3e8ad
homepage    : https://github.com/stephenberry/glaze
license     : MIT
summary     : Extremely fast, in memory, JSON and interface library for modern C++
