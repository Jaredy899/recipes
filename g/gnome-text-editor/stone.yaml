name        : gnome-text-editor
version     : "50.1"
release     : 15
homepage    : https://apps.gnome.org/TextEditor/
upstreams   :
    - https://download.gnome.org/sources/gnome-text-editor/50/gnome-text-editor-50.1.tar.xz : f68036b09d378faa883bfe936e479c6ff37027c2ffed101daf912df70c51d0e6
summary     : A simple text editor
description : |
    Text Editor is a simple text editor that focuses on session management.
license     :
    - GPL-3.0-only
builddeps   :
    - binary(itstool)
    - binary(msgfmt)
    - pkgconfig(editorconfig)
    - pkgconfig(gio-2.0)
    - pkgconfig(gtk4)
    - pkgconfig(gtksourceview-5)
    - pkgconfig(libadwaita-1)
    - pkgconfig(libspelling-1)
setup       : |
    sed -i '/update_desktop_database/d' meson.build
    %meson
build       : |
    %meson_build
install     : |
    %meson_install
