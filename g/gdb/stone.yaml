name        : gdb
version     : "17.2"
release     : 10
homepage    : https://www.sourceware.org/gdb
upstreams   :
    - https://ftp.gnu.org/gnu/gdb/gdb-17.2.tar.xz : 1c036c0d72e4b3d1fb5c94c88632add6f9d76f4d7c4d2ea793c12a9f19a3228c
summary     : The GNU debugger
description : |
    GDB, the GNU Project debugger, allows you to see what is going on "inside" another program while it executes - or what another program was doing at the moment it crashed.
license     :
    - GPL-3.0-or-later
builddeps   :
    - binary(makeinfo)
    - binary(msgfmt)
    - pkgconfig(expat)
    - pkgconfig(gmp)
    - pkgconfig(libdebuginfod)
    - pkgconfig(liblzma)
    - pkgconfig(libxxhash)
    - pkgconfig(libzstd)
    - pkgconfig(mpfr)
    - pkgconfig(python3)
    - pkgconfig(readline)
    - pkgconfig(zlib)
    # TODO: libguile, libipt, source-highlight
setup       : |
    %configure \
        --enable-tui \
        --with-python=%(bindir)/python3 \
        --with-system-readline \
        --with-system-zlib \
        --with-zstd
build       : |
    %make
install     : |
    %make_install -C gdb
    %make_install -C gdbserver

    rm -rv %(installroot)/usr/share/info/dir

    %install_dir %(installroot)/%(docdir)/replace/%(name)-devel
    echo "Removed" > %(installroot)/%(docdir)/replace/%(name)-devel/TRANSITION
packages    :
    - "%(name)":
        paths:
            - /usr/include
            - /usr/lib/*.so

    - "%(name)-devel":
        paths:
            - /usr/share/doc
