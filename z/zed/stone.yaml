name        : zed
version     : "1.1.8"
release     : 42
summary     : High performance, graphical code editor
license     :
    - AGPL-3.0
    - Apache-2.0
    - GPL-3.0
homepage    : https://zed.dev/
upstreams   :
    - https://github.com/zed-industries/zed/archive/refs/tags/v1.1.8.tar.gz : d139a71fe14ec13739add7fddae90b39bd34538aebb6abd12afa303398713137
description : |
    Code at the speed of thought – Zed is a high-performance, multiplayer code editor from the creators of Atom and Tree-sitter.
builddeps   :
    - binary(cargo)
    - binary(cmake)
    - binary(envsubst)
    - binary(jq)
    - binary(make)
    - binary(mold)
    - pkgconfig(alsa)
    - pkgconfig(fontconfig)
    - pkgconfig(gl)
    - pkgconfig(glib-2.0)
    - pkgconfig(libcurl)
    - pkgconfig(libdrm)
    - pkgconfig(libelf)
    - pkgconfig(libgit2)
    - pkgconfig(libssl)
    - pkgconfig(sqlite3)
    - pkgconfig(vulkan)
    - pkgconfig(wayland-client)
    - pkgconfig(x11)
    - pkgconfig(xkbcommon)
    - pkgconfig(xkbcommon-x11)
    - libstdc++-devel
rundeps     :
    - binary(unzip)
networking  : true
tuning      :
    - lto: false
environment : |
    export RUSTFLAGS="$RUSTFLAGS -Clink-arg=-fuse-ld=mold"
    export ZED_UPDATE_EXPLANATION="Package updates are provided via moss"
    export LIBGIT2_NO_VENDOR=1
setup       : |
    %cargo_fetch
build       : |
    RUST_BACKTRACE=1 %cargo_build -p zed -p cli
install     : |
    %install_dir %(installroot)%(libexecdir)
    %install_exe target/*/release/zed %(installroot)%(libexecdir)/zed-editor
    %install_exe target/*/release/cli %(installroot)%(bindir)/zed

    # stolen from zed's bundle-linux script
    export DO_STARTUP_NOTIFY="true"
    export APP_CLI="zed"
    export APP_ICON="zed"
    export APP_ARGS="%%U"
    export APP_NAME="Zed"

    # desktop file.
    %install_dir %(installroot)%(datadir)/applications
    envsubst < "crates/zed/resources/zed.desktop.in" > "%(installroot)%(datadir)/applications/dev.zed.Zed.desktop"

    # icons
    %install_file crates/zed/resources/app-icon.png %(installroot)%(datadir)/icons/hicolor/512x512/apps/zed.png
    %install_file crates/zed/resources/app-icon@2x.png %(installroot)%(datadir)/icons/hicolor/1024x1024/apps/zed.png
