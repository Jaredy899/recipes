name        : signon-kwallet-extension
version     : "26.04.1"
release     : 14
upstreams   :
    - https://download.kde.org/stable/release-service/26.04.1/src/signon-kwallet-extension-26.04.1.tar.xz : e318dea68ea0da89a533dce32afa07374c68c161f5d601480522cc0d0ee8fceb
homepage    : https://kde.org/
license     : GPL-2.0-or-later
summary     : KWallet integration for signon framework
description : |
    KWallet integration for signon framework
builddeps   :
    # Temporary, boulder doesn't handle build ordering resolution correctly when builddeps are added by macros, so add ECM manually
    - cmake(ECM)
    - cmake(KF6Wallet)
    - pkgconfig(SignOnExtension)
setup       : |
    %cmake_kf6 \
        -DBUILD_WITH_QT6=ON
build       : |
    %cmake_build
install     : |
    %cmake_install
