name        : cosmic-icons
version     : "1.0.12.git+2c697e8"
release     : 37
summary     : Cosmic Icons by System76
license     : CC-BY-SA-4.0
homepage    : https://github.com/pop-os/cosmic-icons
upstreams   :
    - git|https://github.com/pop-os/cosmic-icons.git : 2c697e8e97cfd619107a872b28c31317281184ff
description : |
    Cosmic Icons by System76
builddeps   :
    - binary(gtk-update-icon-cache)
    - binary(just)
    - hicolor-icon-theme
    - pop-os-icon-theme
rundeps     :
    - pop-os-icon-theme
install     : |
    just rootdir=%(installroot) install

    for i in %(installroot)%(datadir)/icons/*/; do
        gtk-update-icon-cache -f $i
    done
