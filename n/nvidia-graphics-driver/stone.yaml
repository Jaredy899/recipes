name        : nvidia-graphics-driver
version     : "595.71.05"
release     : 43
homepage    : https://www.nvidia.com/
upstreams   :
    - https://us.download.nvidia.com/XFree86/Linux-x86_64/595.71.05/NVIDIA-Linux-x86_64-595.71.05.run:
        hash: 36203b8960b7e49c8a42f6ba1f5863cde34a05e93d2b24b798af06dd846f6b82
        unpack: false
        rename: NVIDIA.run
    - https://download.nvidia.com/XFree86/nvidia-persistenced/nvidia-persistenced-595.71.05.tar.bz2:
        hash: e821b031df99736919364315501a629f5fcfe3f737333d4f682f04cc5db28df7
        rename: nvidia-persistenced.tar.bz2
        extract: false
summary     : The proprietary NVIDIA graphics driver
description : |
    This package provides the NVIDIA graphics driver for desktop systems.
license     : Proprietary
strip       : false
builddeps   :
    - glibc-32bit
    - binary(bzip2)
    - binary(cpio)
    - binary(tar)
    - binary(zstd)
    - pkgconfig32(libglvnd)
    - pkgconfig32(vulkan)
    - sysbinary(modprobe)
install     : |
    sh %(sourcedir)/NVIDIA.run --extract-only --target extracted
    %install_file extracted/firmware/*.bin -t %(installroot)%(libdir)/firmware/nvidia/%(version)
    sh %(sourcedir)/NVIDIA.run \
        --skip-module-load \
        --no-questions \
        --x-prefix=%(installroot)%(prefix) \
        --opengl-prefix=%(installroot)%(prefix) \
        --utility-prefix=%(installroot)%(prefix) \
        --wine-prefix=%(installroot)%(prefix) \
        --log-file-name=%(workdir)/nvidia-installer.log \
        --ui=none \
        --no-kernel-modules \
        --no-x-check \
        --no-nouveau-check \
        --no-disable-nouveau \
        --no-sigwinch-workaround \
        --no-distro-scripts \
        --no-check-for-alternate-installs \
        --skip-depmod \
        --no-rebuild-initramfs \
        --glvnd-egl-config-path=%(installroot)%(datadir)/glvnd/egl_vendor.d \
        --egl-external-platform-config-path=%(installroot)%(datadir)/egl/egl_external_platform.d \
        --systemd-unit-prefix=%(installroot)%(libdir)/systemd/system \
        --systemd-sleep-prefix=%(installroot)%(libdir)/systemd/system-sleep \
        --compat32-libdir=/usr/lib32 \
        --compat32-prefix=%(installroot)
    cat %(workdir)/nvidia-installer.log
    rm %(installroot)%(bindir)/{nvidia-installer,nvidia-uninstall}

    # Compress firmware
    pushd %(installroot)%(libdir)/firmware/nvidia/%(version)/
    find . -name '*.bin' -print -exec zstd -19 {} \; -exec rm -v {} \;
    popd

    # Create firmware initrd
    mkdir -p initrd
    %install_file extracted/firmware/*.bin -t initrd/%(libdir)/firmware/nvidia/%(version)
    pushd initrd
    find . | cpio -o -H newc | zstd -19 -T0 -c > ../firmware.initrd
    popd
    %install_file firmware.initrd %(installroot)%(libdir)/kernel/initrd.d/55-nvidia-firmware.initrd

    # Fix gbm
    rm -v %(installroot)%(libdir)/gbm/nvidia-drm_gbm.so
    ln -s ../libnvidia-allocator.so.1 %(installroot)%(libdir)/gbm/nvidia-drm_gbm.so
    rm -v %(installroot)/usr/lib32/gbm/nvidia-drm_gbm.so
    ln -s ../libnvidia-allocator.so.1 %(installroot)/usr/lib32/gbm/nvidia-drm_gbm.so

    # Used for ray-tracing (Nvidia OptiX framework)
    %install_file extracted/nvoptix.bin -t %(installroot)%(datadir)/nvidia

    # unused
    rm -v %(installroot)%(libdir)/libnvidia-gtk2.so*
    rm -v %(installroot)%(libdir)/libnvidia-pkcs11.so*
    rm -v %(installroot)%(libdir)/libGLX_indirect.so.0
    rm -v %(installroot)/usr/lib32/libGLX_indirect.so.0
    %install_file extracted/nvidia_icd.json %(installroot)%(datadir)/vulkan/icd.d/nvidia_icd.json
    %install_file extracted/nvidia_icd_vksc.json %(installroot)%(datadir)/vulkansc/icd.d/nvidia_icd.json
    %install_file extracted/nvidia_layers.json %(installroot)%(datadir)/vulkan/implicit_layer.d/nvidia_layers.json

    # dbus config
    %install_file extracted/nvidia-dbus.conf %(installroot)%(datadir)/dbus-1/system.d/nvidia-dbus.conf

    # udev rules
    %install_file %(pkgdir)/80-nvidia-pm.rules %(installroot)%(libdir)/udev/rules.d/80-nvidia.rules
    %install_file extracted/nvidia-drm-outputclass.conf %(installroot)%(datadir)/X11/xorg.conf.d/20-nvidia.conf

    install -m755 extracted/nvidia-modprobe %(installroot)%(bindir)/nvidia-modprobe

    # sort out persistenced
    %install_exe extracted/nvidia-persistenced %(installroot)%(bindir)/nvidia-persistenced
    mkdir _nvp && tar xf %(sourcedir)/nvidia-persistenced.tar.bz2 -C _nvp --strip-components=1
    pushd _nvp
    %patch %(pkgdir)/0001-init-Set-the-systemd-user.patch
    %install_file init/systemd/nvidia-persistenced.service.template %(installroot)%(libdir)/systemd/system/nvidia-persistenced.service
    %install_file %(pkgdir)/nvidia-persistenced.group %(installroot)%(libdir)/userdb/nvidia-persistenced.group
    ln -s nvidia-persistenced.group %(installroot)%(libdir)/userdb/143.group
    %install_file %(pkgdir)/nvidia-persistenced.user %(installroot)%(libdir)/userdb/nvidia-persistenced.user
    ln -s nvidia-persistenced.user %(installroot)%(libdir)/userdb/143.user
    %tmpfiles "D /run/nvidia-persistenced 0755 nvidia-persistenced nvidia-persistenced -"
    popd

    # Ensure that systemd services are enabled
    %install_file %(pkgdir)/*.preset -t %(installroot)/%(libdir)/systemd/system-preset/

    # Various Nvidia modprobe settings (taken from CachyOS)
    %install_file %(pkgdir)/nvidia.modprobe %(installroot)%(libdir)/modprobe.d/nvidia.conf

    # Provided by egl-wayland
    rm -v %(installroot)/usr/lib*/libnvidia-egl-wayland.so* \
          %(installroot)%(datadir)/egl/egl_external_platform.d/10_nvidia_wayland.json

    # Provided by egl-wayland2
    rm -v %(installroot)/usr/lib*/libnvidia-egl-wayland2.so* \
          %(installroot)%(datadir)/egl/egl_external_platform.d/09_nvidia_wayland2.json

    # Provided by egl-gbm
    rm -v %(installroot)/usr/lib*/libnvidia-egl-gbm.so* \
          %(installroot)%(datadir)/egl/egl_external_platform.d/15_nvidia_gbm.json

    # Provided by egl-x11
    rm -v %(installroot)/usr/lib*/libnvidia-egl-xcb.so* \
          %(installroot)/usr/lib*/libnvidia-egl-xlib.so* \
          %(installroot)%(datadir)/egl/egl_external_platform.d/20_nvidia_xcb.json \
          %(installroot)%(datadir)/egl/egl_external_platform.d/20_nvidia_xlib.json

    # Should be empty now
    rmdir -v %(installroot)%(datadir)/egl/egl_external_platform.d \
             %(installroot)%(datadir)/egl/

    # Provided by ocl-icd
    rm -v %(installroot)%(libdir){,32}/libOpenCL*

    # Make sure opencl works
    %install_file extracted/nvidia.icd -t %(installroot)%(datadir)/OpenCL/vendors

    # We don't support GLESv1 on Aeryn
    rm -v %(installroot)%(libdir){,32}/libGLESv1_CM_nvidia*

    # Only useful for x11 sessions
    rm -v %(installroot)%(bindir)/nvidia-xconfig

    # I don't know if nvidia-settings is useful or not but might as well fix the path
    sed -i "s|/mason/install||g" %(installroot)%(datadir)/applications/nvidia-settings.desktop

    # Man pages
    %install_file extracted/*.1.gz -t %(installroot)%(mandir)/man1/

    # Remove man pages for binaries we don't ship
    rm -v %(installroot)%(mandir)/man1/nvidia-installer* \
          %(installroot)%(mandir)/man1/nvidia-xconfig*

    # Lists NVIDIA driver files for container runtimes like nvidia-container-toolkit
    %install_file extracted/sandboxutils-filelist.json -t %(installroot)%(datadir)/nvidia/files.d/

    # Finally, documentation files for nvidia-settings
    %install_file extracted/nvidia-application-profiles-%(version)-key-documentation %(installroot)%(datadir)/nvidia/nvidia-application-profiles-%(version)-key-documentation

    %install_file extracted/nvidia-application-profiles-%(version)-rc %(installroot)%(datadir)/nvidia/nvidia-application-profiles-%(version)-rc
    # Taken from https://raw.githubusercontent.com/Frogging-Family/nvidia-all/refs/heads/master/system/limit-vram-usage, check that file for updates
    # TODO: This might not actually work according to profiles.html, open an upstream issue to enable that
    %install_file %(pkgdir)/limit-vram-usage -t %(installroot)%(datadir)/nvidia/nvidia-application-profiles-%(version)-rc.d

    chmod 4755 %(installroot)%(bindir)/nvidia-modprobe
packages    :
    - "%(name)":
        paths:
            # Prevent emission of -devel subpackage
            - /usr/lib/lib*.so*
        rundeps     :
            - egl-gbm
            - egl-wayland
            - egl-wayland2
            - egl-x11
            - eglexternalplatform
            - nvidia-open-gpu-kernel-modules

    - "%(name)-32bit":
        paths:
            - /usr/lib32/lib*.so*
        rundeps:
            - egl-gbm-32bit
            - egl-wayland-32bit
            - egl-wayland2-32bit
            - egl-x11-32bit

    - "%(name)-firmware":
        summary: Firmware for Nvidia GPUs
        description: Firmware for Nvidia GPUs
        paths:
            - /usr/lib/firmware/nvidia/
            - /usr/lib/kernel/initrd.d/55-nvidia-firmware.initrd
