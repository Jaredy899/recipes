name        : nspr
version     : "4.39"
release     : 9
homepage    : https://firefox-source-docs.mozilla.org/nspr/index.html
upstreams   :
    - https://archive.mozilla.org/pub/nspr/releases/v4.39/src/nspr-4.39.tar.gz : bbd02ee87a55676063a63e5bc819e0227de2666b47307b2a0134414cdf42368e
summary     : Netscape Portable Runtime Libraries
description : |
    Portable runtime functions for Firefox and similar projects
license     :
    - MPL-2.0-no-copyleft-exception
packages    :
    - "%(name)":
        paths:
            - /usr/lib/*.so*
    - "%(name)-32bit":
        paths:
            - /usr/lib32/*.so*
    - "%(name)-devel":
        paths:
            - /usr/bin
environment : |
    cd nspr
emul32      : true
profiles    :
    - emul32:
        setup: |
            sed -i 's#$(LIBRARY) ##' config/rules.mk

            # cannot access nspr.m4: Value too large for defined data type
            export CPPFLAGS+=" -D_FILE_OFFSET_BITS=64 -D_LARGEFILE_SOURCE -D_LARGEFILE64_SOURCE"

            %configure \
                --with-mozilla \
                --with-pthreads \
                --disable-static
setup: |
    sed -i 's#$(LIBRARY) ##' config/rules.mk
    %configure \
        --with-mozilla \
        --with-pthreads \
        --enable-64bit
build       : |
    %make
install     : |
    %make_install
