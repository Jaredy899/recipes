name        : nvidia-open-gpu-kernel-modules
version     : "595.71.05"
release     : 90
homepage    : https://github.com/NVIDIA/open-gpu-kernel-modules
upstreams   :
    - https://download.nvidia.com/XFree86/NVIDIA-kernel-module-source/NVIDIA-kernel-module-source-595.71.05.tar.xz:
        hash: 1f558b1e7d4cd2b7901ee01bdea6f8bd439916bd61fa36bbf736fbe8703414cd
        unpack: false
        rename: nvidia.tar.xz
summary     : NVIDIA open GPU kernel modules
description : |
    NVIDIA open GPU kernel modules
license     : GPL-2.0-only
builddeps   :
    - binary(cpio)
    - binary(eu-readelf)
    - binary(jq)
    - binary(zstd)
    - linux-gaming-devel
    - linux-lts-devel
    - linux-stable-devel
    - nvidia-graphics-driver-firmware
tuning      :
    - asneeded: false
    - base: false
    - bindnow: false
    - icf: false
    - relr: false
    - symbolic: false
    - build-id: false
    - lto: false
    - compress-debug: false
environment : |
    # Create list of kernels to build for
    declare -a kernels=()
    for dir in %(libdir)/kernel/*/; do
        dir=${dir%*/}
        tmp=${dir##*/}

        if [ "${tmp}" != "initrd.d" ]; then
            kernels+=(${tmp})
        fi
    done

    # TODO: Fix this just rejecting all LDFLAGS
    unset LDFLAGS
setup       : |
    for _kernel in ${kernels[@]}; do
        mkdir ${_kernel}
        bsdtar-static -xf %(sourcedir)/nvidia.tar.xz --strip-components=1 -C ${_kernel}

        pushd ${_kernel}
        # This is where patches would go
        ## None for now
        popd
    done
build       : |
    for _kernel in ${kernels[@]}; do
        pushd ${_kernel}
        %ccache_zero
        export CCACHE_BASEDIR="${PWD}"
        %make CC=${CC} LD=${LD} KERNEL_UNAME=${_kernel} NV_VERBOSE=1 modules
        %ccache_stats
        popd
    done
install     : |
    %install_file %(pkgdir)/nvidia-blacklist.conf %(installroot)%(libdir)/modprobe.d/nvidia-blacklist.conf
    %install_file %(pkgdir)/nvidia-uvm.conf %(installroot)%(libdir)/modules-load.d/nvidia-uvm.conf

    %install_dir %(installroot)%(docdir)/%(name)/
    echo "VIRTUAL" > %(installroot)%(docdir)/%(name)/README

    for _kernel in ${kernels[@]}; do
        pushd ${_kernel}
        %install_file kernel-open/*.ko -t %(installroot)%(libdir)/modules/${_kernel}/extra/drivers/video

        # Manually construct the debug info from the kernel modules
        %install_dir %(installroot)%(libdir)/debug/.build-id
        pushd %(installroot)%(libdir)/modules/${_kernel}
        module_list=()
        while IFS=  read -r -d $'\0'; do
            module_list+=("$REPLY")
        done < <(find . -type f -name "*.ko" -print0)
        for module in "${module_list[@]}"; do
            build_id=$(eu-readelf -n ${module} | awk '/Bui/ {print $3}')
            debug_path="%(libdir)/debug/.build-id/${build_id:0:2}/${build_id: 2}.debug"

            pushd $(dirname ${module})
            file=$(basename ${module})

            llvm-objcopy --only-keep-debug "${file}" "${file}.debug"
            llvm-objcopy --add-gnu-debuglink "${file}.debug" "${file}"
            llvm-strip -g --strip-unneeded "${file}"
            %install_file "${file}.debug" "%(installroot)/${debug_path}"
            rm -v "${file}.debug"

            popd
        done
        popd

        # Create an initrd for .ko files
        mkdir -p initrd/%(libdir)/modules/${_kernel}/extra/drivers/video
        %install_file %(pkgdir)/nvidia.conf initrd/%(libdir)/modprobe.d/nvidia.conf
        %install_file %(pkgdir)/nvidia-blacklist.conf initrd/%(libdir)/modprobe.d/nvidia-blacklist.conf
        find %(installroot)%(libdir)/modules -name '*.ko' -exec cp -v {} initrd/%(libdir)/modules/${_kernel}/extra/drivers/video \;
        touch initrd/.dracut-depmod-invalidate
        pushd initrd
        %install_dir %(installroot)%(libdir)/kernel/${_kernel}
        find . | cpio -o -H newc | zstd -19 -T0 -c > %(installroot)%(libdir)/kernel/${_kernel}/60-nvidia.initrd
        popd

        # Compress modules with zstd
        find "%(installroot)%(libdir)/modules/${_kernel}/" -name '*.ko' -print -exec zstd {} \; -exec rm -v {} \;

        # This is a stupid hack because blsforme doesn't seem to support version-independent initrds yet
        cp -a /usr/lib/kernel/initrd.d/55-nvidia-firmware.initrd %(installroot)%(libdir)/kernel/${_kernel}/55-nvidia-firmware.initrd

        popd
    done
packages    :
    - "%(name)-shared":
        summary: Shared components for %(name)
        description: Shared components for %(name)
        paths:
            - /usr/lib/modprobe.d/
            - /usr/lib/modules-load.d/

    # TODO: Make this a virtual package that depends on the correct subpackage (-shared can be merged into it)
    - "%(name)":
        rundeps:
            # For backwards compat, remove with conditional deps
            - "%(name)-stable"

    - "%(name)-gaming":
        summary: "%(name) built for gaming kernel"
        description: "%(name) built for gaming kernel"
        rundeps:
            - "%(name)-shared"
            - nvidia-graphics-driver-firmware
            - sysbinary(depmod)

            - linux-gaming
        paths:
            - /usr/lib/kernel/*.gaming/
            - /usr/lib/modules/*.gaming/

    - "%(name)-lts":
        summary: "%(name) built for LTS kernel"
        description: "%(name) built for LTS kernel"
        rundeps:
            - "%(name)-shared"
            - nvidia-graphics-driver-firmware
            - sysbinary(depmod)

            - linux-lts
        paths:
            - /usr/lib/kernel/*.lts/
            - /usr/lib/modules/*.lts/

    - "%(name)-stable":
        summary: "%(name) built for stable kernel"
        description: "%(name) built for stable kernel"
        rundeps:
            - "%(name)-shared"
            - nvidia-graphics-driver-firmware
            - sysbinary(depmod)

            - linux-stable
        paths:
            - /usr/lib/kernel/*.stable/
            - /usr/lib/modules/*.stable/
