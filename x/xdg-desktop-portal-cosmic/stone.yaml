name        : xdg-desktop-portal-cosmic
version     : "1.0.12.git+db8ec7c"
release     : 40
summary     : Cosmic Desktop - XDG Portal Support
license     : GPL-3.0
homepage    : https://github.com/pop-os/xdg-desktop-portal-cosmic
upstreams   :
    - git|https://github.com/pop-os/xdg-desktop-portal-cosmic.git : db8ec7cf496ed0f2028c67f4eec7ffdc2cbcf145
description : |
    Cosmic Desktop - XDG Portal Support
builddeps   :
    - binary(just)
    - pkgconfig(gbm)
    - pkgconfig(glib-2.0)
    - pkgconfig(libpipewire-0.3)
    - pkgconfig(xkbcommon)
rundeps     :
    - binary(pipewire)
    - gvfs # Used for file services
    - xdg-desktop-portal
networking  : true
setup       : |
    %cargo_fetch
build       : |
    %cargo_build
install     : |
    %make_install TARGET=%(target_triple)/release prefix=%(prefix)
